apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opencost
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://opencost.github.io/opencost-helm-chart
    chart: opencost
    targetRevision: 1.42.0
    helm:
      values: |
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::626635430480:role/demo-dev-cluster-opencost"

        opencost:
          exporter:
            defaultClusterId: demo-dev-cluster
            aws:
              spot_data_region: ap-southeast-1
          
          # [수정] Prometheus 연결 대기 시간을 넉넉하게 부여 (Startup Probe)
          # 인덱싱 작업 중에 컨테이너가 재시작되는 것을 방지합니다.
          probes:
            startupProbe:
              initialDelaySeconds: 30
              periodSeconds: 10
              failureThreshold: 30

          prometheus:
            internal:
              serviceName: prometheus-kube-prometheus-prometheus
              namespaceName: monitoring
              port: 9090

          ui:
            enabled: true

        # [수정] 메모리를 128Mi에서 512Mi로 증설
        # OpenCost는 초기 실행 시 리소스를 많이 소모하므로 최소 512Mi가 안정적입니다.
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true