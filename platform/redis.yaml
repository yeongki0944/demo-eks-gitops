apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 20.6.2
    helm:
      values: |
        architecture: replication

        master:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          persistence:
            enabled: true
            size: 5Gi

        replica:
          replicaCount: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          persistence:
            enabled: true
            size: 5Gi

        auth:
          enabled: true
          existingSecret: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: middleware
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
