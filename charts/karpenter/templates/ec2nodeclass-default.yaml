apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  role: {{ .Values.karpenterNodeRoleName }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: {{ .Values.defaultNodePool.diskSize }}
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  tags:
    Name: {{ .Values.clusterName }}-karpenter-node
    ManagedBy: argocd
